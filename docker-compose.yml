services:
  redis:
    image: redis:7-alpine
    container_name: mini-commerce-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass 1234!
    volumes:
      - redis-data:/data
    restart: unless-stopped

  backend:
    build: .
    container_name: mini-commerce-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://host.docker.internal:3306/mini_commerce?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: MINI_COMMERCE_USER
      SPRING_DATASOURCE_PASSWORD: MINICOMMERCEUSER
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: "1234!"
    depends_on:
      - redis
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: mini-commerce-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis-data:
